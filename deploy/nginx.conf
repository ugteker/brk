# Combined nginx config for the all-in-one ChatTrader container. Serves the
# built SPA and reverse-proxies /api/* to the API process running in the
# SAME container (localhost:3000) — see deploy/entrypoint.sh, which starts
# node, nginx, and cloudflared side by side as sibling processes.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Dedicated SSE transport for the single global realtime stream. Matched
    # exactly (before the generic /api/ location below) so this is the only
    # path that gets the long-timeout, unbuffered proxy treatment SSE needs.
    location = /api/realtime/stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Fastify API, same container, listening on 127.0.0.1:3000. Routes are
    # mounted under /api/* in apps/api/src/server.ts.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve auth cookies for the session-cookie based auth flow.
        proxy_set_header Cookie $http_cookie;
        # SSE support (EventSource streams: /api/agents/:id/stream,
        # /api/discussions/:id/runs/:runId/stream). Default proxy buffering
        # holds event-stream bytes in nginx's buffer so the browser never
        # receives them until the response ends - which is why live updates
        # worked locally (no nginx) but not in production. Buffering off is
        # safe for the regular JSON API too (responses are small).
        proxy_buffering off;
        proxy_cache off;
        # Keep long-lived SSE connections open (default 60s would cut idle
        # streams; EventSource would reconnect, but updates in between are lost).
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Static SPA with client-side routing fallback (all other paths ->
    # index.html) so refresh/deep links work.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
