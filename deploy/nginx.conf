# Combined nginx config for the all-in-one ChatTrader container. Serves the
# built SPA and reverse-proxies /api/* to the API process running in the
# SAME container (localhost:3000) — see deploy/entrypoint.sh, which starts
# node, nginx, and cloudflared side by side as sibling processes.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Fastify API, same container, listening on 127.0.0.1:3000. Routes are
    # mounted under /api/* in apps/api/src/server.ts.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve auth cookies for the session-cookie based auth flow.
        proxy_set_header Cookie $http_cookie;
    }

    # Static SPA with client-side routing fallback (all other paths ->
    # index.html) so refresh/deep links work.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
