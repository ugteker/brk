# ChatTrader production stack — single Hetzner VPS, single all-in-one
# container (API + web + cloudflared), fronted by a Cloudflare Quick Tunnel
# (no owned domain yet; see deploy/README.md).
#
# Secrets: loaded from `.env` at the repo root on the server (git-ignored,
# mode 600 — see apps/api/.env.example for the template of required keys).
# Nothing sensitive is baked into the image or written into this file.

services:
  chattrader:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BUILD_TIMESTAMP: ${VITE_BUILD_TIMESTAMP:-}
        VITE_BUILD_COMMIT_SHA: ${VITE_BUILD_COMMIT_SHA:-}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/api/prisma/dev.db"
    volumes:
      - api-data:/app/api/prisma
      # Server-side secrets materialized by CI (not stored in git); mounted read-only
      # so GOOGLE_TTS_CREDENTIALS can point at /run/secrets/google-tts-service-account.json.
      - ./secrets:/run/secrets:ro
    # Published on the host so the server's public IP works directly
    # (temporary, until a real domain + named Cloudflare tunnel replaces
    # this — see deploy/README.md). cloudflared's Quick Tunnel keeps
    # running alongside this regardless; both access paths work.
    ports:
      - "80:80"

volumes:
  api-data:
