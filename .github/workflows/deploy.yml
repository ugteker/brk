name: Deploy

on:
  push:
    # Release policy: deployments happen from master only.
    # Changes from alpha must be promoted via PR merge into master.
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install API deps
        run: npm ci
        working-directory: apps/api
      - name: Test API
        run: npm run test
        working-directory: apps/api
      - name: Install web deps
        run: npm ci
        working-directory: apps/web
      - name: Test web
        run: npm run test
        working-directory: apps/web

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      # The server keeps its own git clone at /opt/brokerino (set up once
      # during the manual first run — see deploy/README.md). We only need to
      # (1) refresh the .env from the current secret value, since it can
      # change independently of code, and (2) trigger deploy/deploy.sh, which
      # does the git pull + docker compose build/up itself. The .env content
      # is written via a heredoc over the SSH connection so it never appears
      # as a command-line argument or in this workflow's own logs.
      - name: Write server .env and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: HETZNER_APP_ENV
          script: |
            umask 077
            cat > /opt/brokerino/.env <<'BROKERINO_ENV_EOF'
            ${HETZNER_APP_ENV}
            BROKERINO_ENV_EOF
            chmod 600 /opt/brokerino/.env
            /opt/brokerino/deploy/deploy.sh
        env:
          HETZNER_APP_ENV: ${{ secrets.HETZNER_APP_ENV }}
