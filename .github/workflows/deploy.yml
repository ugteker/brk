name: ChatTrader Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install API deps
        run: npm ci
        working-directory: apps/api
      - name: Test API
        run: npm run test
        working-directory: apps/api
      - name: Install web deps
        run: npm ci
        working-directory: apps/web
      - name: Test web
        run: npm run test
        working-directory: apps/web

  deploy-production:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_PATH: /opt/ChatTrader
      DEPLOY_BRANCH: master
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Write server .env and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: HETZNER_APP_ENV,DEPLOY_PATH,DEPLOY_BRANCH
          script: |
            set -e
            umask 077
            printf '%s\n' "$HETZNER_APP_ENV" > "$DEPLOY_PATH/.env"
            chmod 600 "$DEPLOY_PATH/.env"
            cd "$DEPLOY_PATH"
            git pull --ff-only origin "$DEPLOY_BRANCH"
            export VITE_BUILD_TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            export VITE_BUILD_COMMIT_SHA="$(git rev-parse --short HEAD)"
            docker compose build --no-cache
            docker compose up -d --remove-orphans
            sleep 5
            docker compose logs chattrader --tail 50 | grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' | tail -n 1 || true
        env:
          HETZNER_APP_ENV: ${{ secrets.HETZNER_APP_ENV }}
